<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="theme-color" content="#171717" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="LibreChat - An open source chat application with support for multiple AI models" />
    <title>Molinos AI</title>
    <link rel="icon" type="image/svg+xml" href="assets/molinos-iso.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0d0d0d';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0d0d0d' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #splash-screen {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          flex-direction: column;
          gap: 28px;
          align-items: center;
          justify-content: center;
          background-color: ${backgroundColor};
          opacity: 1;
          transform: translateY(0);
          transition:
            opacity 420ms cubic-bezier(0.16, 1, 0.3, 1),
            transform 420ms cubic-bezier(0.16, 1, 0.3, 1);
          will-change: opacity, transform;
        }

        #splash-screen.splash-screen--hidden {
          pointer-events: none;
          opacity: 0;
          transform: translateY(-14px);
        }

        #splash-screen::after {
          width: 96px;
          height: 3px;
          border-radius: 999px;
          background: linear-gradient(90deg, #224594 0%, #e4262a 100%);
          content: '';
          animation: splash-pulse 1200ms ease-in-out infinite;
        }

        .splash-claim {
          width: min(42vw, 260px);
          min-width: 172px;
          max-height: 188px;
          object-fit: contain;
        }

        @keyframes splash-pulse {
          0%, 100% {
            opacity: 0.32;
            transform: scaleX(0.72);
          }
          50% {
            opacity: 1;
            transform: scaleX(1);
          }
        }

        @media (prefers-reduced-motion: reduce) {
          #splash-screen {
            transition: opacity 160ms ease;
          }

          #splash-screen.splash-screen--hidden {
            transform: none;
          }

          #splash-screen::after {
            animation: none;
          }
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash-screen" role="status" aria-label="Cargando Molinos AI">
      <img class="splash-claim" src="assets/molinos-claim.svg" alt="Molinos" />
    </div>
  </body>
</html>
